services:
  # Локальна БД для розробки та джерело для копіювання даних на remote.
  # Запуск: docker compose up -d
  postgres:
    image: postgres:16-alpine
    container_name: dms-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: diploma_management
      POSTGRES_USER: diploma
      POSTGRES_PASSWORD: diploma_dev
    ports:
      - "5432:5432"
    volumes:
      - dms_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U diploma -d diploma_management"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  dms_pg_data:
